<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serafyn — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0c0a;
      font-family: 'Lato', sans-serif;
      padding: 2rem 1rem;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid rgba(255, 220, 180, 0.35);
      object-fit: cover;
      margin-bottom: 1.25rem;
    }
    .name {
      font-family: 'Cinzel', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: #f0ece6;
      letter-spacing: .08em;
      margin-bottom: .3rem;
    }
    .tagline {
      font-size: .78rem;
      color: #888;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      font-weight: 300;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      width: 100%;
      max-width: 340px;
    }
    .link-btn {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .85rem 1.25rem;
      border-radius: 12px;
      border: .5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #e8e4de;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 400;
      letter-spacing: .03em;
      transition: background .18s, border-color .18s, transform .12s;
    }
    .link-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }
    .link-btn:active { transform: translateY(0); }
    .link-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .link-icon svg { width: 20px; height: 20px; fill: #999; }
    .link-label { flex: 1; }
    .link-arrow { font-size: 14px; color: #555; }
    .arrow-svg { width: 14px; height: 14px; stroke: #555; fill: none; flex-shrink: 0; }
  </style>
</head>
